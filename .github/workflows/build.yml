name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── macOS universal DMG ──────────────────────────────────────────────────
  build-mac:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS ICNS icon
        run: |
          mkdir -p electron/icons/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size electron/icons/icon.png --out electron/icons/icon.iconset/icon_${size}x${size}.png
          done
          sips -z 32  32  electron/icons/icon.png --out electron/icons/icon.iconset/icon_16x16@2x.png
          sips -z 64  64  electron/icons/icon.png --out electron/icons/icon.iconset/icon_32x32@2x.png
          sips -z 256 256 electron/icons/icon.png --out electron/icons/icon.iconset/icon_128x128@2x.png
          sips -z 512 512 electron/icons/icon.png --out electron/icons/icon.iconset/icon_256x256@2x.png
          iconutil -c icns electron/icons/icon.iconset --output electron/icons/icon.icns

      - name: Build macOS DMG (universal)
        run: npx electron-builder --mac dmg --universal --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 30

  # ── Windows NSIS + portable ──────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: '%LOCALAPPDATA%\electron\Cache'
          key: electron-win-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (NSIS installer + portable)
        run: npx electron-builder --win nsis portable --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows executables
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30

  # ── Linux AppImage + tar.gz ──────────────────────────────────────────────
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-linux-${{ hashFiles('package-lock.json') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            rpm libarchive-tools \
            libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6

      - name: Install dependencies
        run: npm ci

      - name: Build Linux (AppImage + tar.gz)
        run: npx electron-builder --linux AppImage tar.gz --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            release/*.AppImage
            release/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  # ── Deploy GitHub Pages ──────────────────────────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Create GitHub Release (tags only) ───────────────────────────────────
  release:
    name: Publish Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VideoForge ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.tar.gz
          body: |
            ## VideoForge ${{ github.ref_name }}

            Hardware-accelerated video transcoder. Converts any format to x264 web-optimized MP4.
            **FFmpeg is bundled — no separate install required.**

            ### 🌐 Web Interface
            https://cr4zysh4rk.github.io/video-transcoder/

            ### 💾 Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | 🍎 macOS | `*-universal.dmg` | Universal — Apple Silicon + Intel. Right-click → Open on first launch. |
            | 🪟 Windows | `*Setup*.exe` | NSIS installer with Start Menu shortcut |
            | 🪟 Windows | `*Portable*.exe` | No install — run from anywhere |
            | 🐧 Linux | `*.AppImage` | `chmod +x`, run from anywhere |
            | 🐧 Linux | `*.tar.gz` | Extract and run |

            ### Features
            - Any input → x264 web-optimized MP4 with `-movflags +faststart`
            - NVIDIA NVENC, AMD AMF, Intel QSV, Apple VideoToolbox GPU acceleration
            - Dialogue boost + background attenuation audio controls
            - EBU R128 loudness normalization
            - Batch folder transcoding
            - Real-time progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
