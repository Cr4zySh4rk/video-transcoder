name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── macOS ─────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS Universal DMG
        run: npx electron-builder --mac dmg --universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_NAME: "-"
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean build artifacts
        run: |
          rm -f release/*.blockmap release/*.yml release/*.yaml
          ls -lh release/

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: release/*.dmg
          if-no-files-found: error

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (installer + portable)
        run: npx electron-builder --win nsis portable --x64
        env:
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean build artifacts
        shell: pwsh
        run: |
          Remove-Item release\*.blockmap -ErrorAction SilentlyContinue
          Remove-Item release\*.yml -ErrorAction SilentlyContinue
          Get-ChildItem release\

      - name: Upload Windows executables
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*.exe
          if-no-files-found: error

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm libarchive-tools

      - name: Build Linux (AppImage + tar.gz)
        run: npx electron-builder --linux AppImage tar.gz --x64
        env:
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean build artifacts
        run: |
          rm -f release/*.blockmap release/*.yml release/*.yaml
          ls -lh release/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            release/*.AppImage
            release/*.tar.gz
          if-no-files-found: error

  # ── Android APK (Capacitor WebView wrapper) ───────────────────────────────
  # The VideoForge Android app is a Capacitor WebView wrapper that loads the
  # bundled web UI (docs/) locally, letting users connect to a VideoForge
  # server on their PC over Wi-Fi. No FFmpeg is bundled in the APK; all
  # transcoding runs on the server.
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies (includes Capacitor)
        run: npm ci

      - name: Generate Android project from Capacitor
        run: npx cap add android

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # ── GitHub Pages deploy ───────────────────────────────────────────────────
  # Only runs on pushes to main (not on tags — Pages environment is branch-scoped).
  deploy-pages:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Create Release (only on tags) ─────────────────────────────────────────
  create-release:
    needs: [build-mac, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Rename Android APK with version
        run: |
          VER="${{ github.ref_name }}"
          mv "artifacts/android/app-debug.apk" "artifacts/android/VideoForge-${VER}.apk" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
      